# Codemagic CI/CD Configuration for Labour Ledger Android App
# This file enables automated cloud builds to generate the installable APK file for your Android phone.
# Learn more at: https://docs.codemagic.io/

workflows:
  android-workflow:
    name: Build Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1 # Standard powerful builder machine supporting Android builds
    
    environment:
      java: 21 # Use Java 21 required by Android Gradle Plugin 9.x / Gradle 9.x
      
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
        - pattern: 'master'

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
      - name: Install Gradle 9.3.1
        script: |
          # Ensure Gradle 9.3.1 is installed and available, bypassing any wrapper or cache issues.
          curl -sSLo gradle-9.3.1-bin.zip https://services.gradle.org/distributions/gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip
          chmod +x gradle-9.3.1/bin/gradle

      - name: Build Android Debug APK
        script: |
          # Run the build using the clean, dedicated Gradle 9.3.1 installation
          ./gradle-9.3.1/bin/gradle assembleDebug --no-daemon

    artifacts:
      # Locate and upload the built APK so you can download it directly from the Codemagic dashboard
      - app/build/outputs/apk/**/*.apk
